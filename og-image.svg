<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d1d1f"/>
      <stop offset="100%" style="stop-color:#2c1f2e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Accent bar -->
  <rect x="0" y="0" width="4" height="630" fill="#E60CD2"/>
  <!-- Company name -->
  <text x="80" y="240" font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, sans-serif" font-size="52" font-weight="700" fill="#f5f5f7" letter-spacing="-2">Magenta Networks</text>
  <!-- Tagline -->
  <text x="80" y="310" font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, sans-serif" font-size="26" font-weight="400" fill="rgba(245,245,247,0.45)">Technology · Talent · Singapore</text>
  <!-- Divider -->
  <rect x="80" y="350" width="60" height="3" fill="#E60CD2"/>
  <!-- Sub-line -->
  <text x="80" y="410" font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, sans-serif" font-size="22" font-weight="400" fill="rgba(245,245,247,0.35)">Global Career Fellowship · Professional Services</text>
  <!-- URL -->
  <text x="80" y="570" font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, sans-serif" font-size="18" font-weight="500" fill="rgba(245,245,247,0.2)" letter-spacing="0.5">mgnnetworks.com</text>
</svg>
