<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- White background -->
  <rect width="500" height="500" fill="white"/>

  <!-- Drawing order: back to front so edges layer correctly -->

  <!-- Blue arm — right horizontal -->
  <rect x="223" y="177" width="220" height="127" rx="63"
        fill="white" stroke="#1E88E5" stroke-width="26"/>

  <!-- Red arm — left horizontal -->
  <rect x="50" y="183" width="267" height="127" rx="63"
        fill="white" stroke="#E53935" stroke-width="26"/>

  <!-- Green arm — top vertical (front layer at top) -->
  <rect x="177" y="50" width="133" height="187" rx="67"
        fill="white" stroke="#43A047" stroke-width="26"/>

  <!-- Magenta arm — bottom vertical (front layer at bottom) -->
  <rect x="190" y="230" width="120" height="213" rx="60"
        fill="white" stroke="#D81B60" stroke-width="26"/>

  <!-- Connector line between nodes -->
  <polyline points="243,177 223,270 257,323"
            fill="none" stroke="#555" stroke-width="6"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Node 1 — blue (top junction) -->
  <circle cx="243" cy="177" r="22" fill="white" stroke="#1E88E5" stroke-width="10"/>

  <!-- Node 2 — green (middle junction) -->
  <circle cx="223" cy="270" r="22" fill="white" stroke="#43A047" stroke-width="10"/>

  <!-- Node 3 — red/dark (lower junction) -->
  <circle cx="257" cy="323" r="22" fill="white" stroke="#B71C1C" stroke-width="10"/>
</svg>
